name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:
    inputs:
      run_gpu_tests:
        description: 'Run GPU tests (requires self-hosted runner)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

env:
  ONNXRUNTIME_VERSION: "1.20.1"

jobs:
  # ==========================================================================
  # Build and Test on CPU
  # ==========================================================================
  build-cpu:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libopencv-dev \
            unzip \
            curl

      - name: Download ONNX Runtime (CPU)
        run: |
          curl -L -o onnxruntime.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          tar -xzf onnxruntime.tgz
          rm onnxruntime.tgz

      - name: Build project
        run: |
          mkdir -p build && cd build
          cmake .. -DONNXRUNTIME_DIR="${GITHUB_WORKSPACE}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}" \
                   -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Verify build
        run: |
          ls -la build/
          ./build/image_inference --help || true

  # ==========================================================================
  # Test Suite (Detection, Segmentation, Pose, OBB, Classification, YOLOE)
  # ==========================================================================
  test-suite:
    runs-on: ubuntu-latest
    needs: build-cpu
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        task: [detection, segmentation, pose, obb, classification, yoloe]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libopencv-dev \
            unzip \
            curl \
            python3 \
            python3-pip \
            python3-venv

      - name: Install uv for Python package management
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download ONNX Runtime (CPU)
        run: |
          curl -L -o onnxruntime.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          tar -xzf onnxruntime.tgz -C tests/
          rm onnxruntime.tgz

      - name: Run ${{ matrix.task }} tests
        working-directory: tests
        run: |
          chmod +x test_${{ matrix.task }}.sh
          ./test_${{ matrix.task }}.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.task }}
          path: tests/${{ matrix.task }}/results/
          retention-days: 7
          if-no-files-found: warn

  # ==========================================================================
  # Benchmark (Optional - Manual Trigger)
  # ==========================================================================
  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: build-cpu
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libopencv-dev \
            unzip \
            curl

      - name: Download ONNX Runtime (CPU)
        run: |
          curl -L -o onnxruntime.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          tar -xzf onnxruntime.tgz
          rm onnxruntime.tgz

      - name: Build benchmark tool
        working-directory: benchmarks
        run: |
          mkdir -p build && cd build
          cmake .. -DONNXRUNTIME_DIR="${GITHUB_WORKSPACE}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}" \
                   -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run benchmarks
        run: |
          echo "Benchmark tool built successfully"
          # Add benchmark runs here when models are available

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
          retention-days: 30
          if-no-files-found: warn

  # ==========================================================================
  # Code Quality Checks
  # ==========================================================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check code formatting (C++)
        run: |
          # Install clang-format if available
          if command -v clang-format &> /dev/null; then
            find include/ src/ examples/ -name "*.cpp" -o -name "*.hpp" | head -20 | \
              xargs -I {} sh -c 'clang-format --dry-run --Werror {} || echo "Format issues in {}"'
          else
            echo "clang-format not available, skipping format check"
          fi

      - name: Check for common issues
        run: |
          # Check for debug prints left in code
          if grep -r "std::cout.*DEBUG\|printf.*debug\|#define DEBUG" include/ src/ --include="*.cpp" --include="*.hpp"; then
            echo "Warning: Debug statements found in code"
          fi
          
          # Check for TODO/FIXME comments
          echo "TODOs found in codebase:"
          grep -r "TODO\|FIXME\|XXX\|HACK" include/ src/ --include="*.cpp" --include="*.hpp" || echo "No TODOs found"

  # ==========================================================================
  # Build and Deploy Docs to GitHub Pages
  # ==========================================================================
  # Requires repo Settings → Pages → Source: GitHub Actions. If Pages is not
  # enabled, deploy-pages returns 404; the deploy step is non-blocking so CI stays green.
  deploy-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs dependencies
        run: pip install mkdocs-material

      - name: Build documentation
        run: mkdocs build --strict --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pages deploy status
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" != "success" ]; then
            echo "::warning::GitHub Pages was not deployed (MkDocs build still succeeded). Enable Pages and set the source to GitHub Actions: https://github.com/${{ github.repository }}/settings/pages"
          fi
